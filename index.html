</button>

  <button class="tab issue-tab tab-active bg-blue-500 text-white" onclick="removeActive(event); loadIssues();">All</button>

  <button class="tab issue-tab " onclick="removeActive(event); loadIssues('closed');">Closed</button>
</div>
